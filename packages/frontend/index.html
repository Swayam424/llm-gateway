<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LLM Gateway Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1rem; font-weight: 500; color: #fff; }
    select { background: #1a1a1a; color: #e0e0e0; border: 1px solid #2a2a2a; padding: 4px 8px; border-radius: 6px; font-size: 13px; }
    .stream-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #888; }
    #chat { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 70%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #1e3a5f; color: #e0e0e0; }
    .assistant { align-self: flex-start; background: #1a1a1a; color: #e0e0e0; border: 1px solid #2a2a2a; }
    .assistant.thinking::after { content: '▋'; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    footer { padding: 1rem 1.5rem; border-top: 1px solid #2a2a2a; display: flex; gap: 0.75rem; }
    textarea { flex: 1; background: #1a1a1a; color: #e0e0e0; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.75rem; font-size: 14px; resize: none; height: 52px; font-family: sans-serif; }
    textarea:focus { outline: none; border-color: #444; }
    button { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 0 1.25rem; font-size: 14px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .status { font-size: 11px; color: #555; padding: 0 1.5rem 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>LLM Gateway</h1>
    <select id="model">
      <option value="llama-3.1-8b-instant">Groq — llama-3.1-8b-instant</option>
      <option value="tinyllama">Ollama — tinyllama</option>
    </select>
    <label class="stream-toggle">
      <input type="checkbox" id="stream" checked>
      Streaming
    </label>
  </header>

  <div id="chat"></div>
  <div class="status" id="status"></div>

  <footer>
    <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send">Send</button>
  </footer>

  <script>
    const GATEWAY = 'http://localhost:3000';
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const status = document.getElementById('status');
    const history = [];

    function addMessage(role, content = '') {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      sendBtn.disabled = true;

      const model = document.getElementById('model').value;
      const stream = document.getElementById('stream').checked;

      history.push({ role: 'user', content: text });
      addMessage('user', text);

      const el = addMessage('assistant');
      el.classList.add('thinking');
      status.textContent = `Sending to ${model}...`;

      try {
        const res = await fetch(`${GATEWAY}/v1/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: history, stream })
        });

        if (stream) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let full = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '));
            for (const line of lines) {
              const data = line.slice(6).trim();
              if (data === '[DONE]') break;
              try {
                const token = JSON.parse(data).choices?.[0]?.delta?.content ?? '';
                full += token;
                el.textContent = full;
                chat.scrollTop = chat.scrollHeight;
              } catch {}
            }
          }
          history.push({ role: 'assistant', content: full });
        } else {
          const data = await res.json();
          const content = data.choices?.[0]?.message?.content ?? 'No response';
          el.textContent = content;
          history.push({ role: 'assistant', content });
        }

        el.classList.remove('thinking');
        status.textContent = '';
      } catch (err) {
        el.textContent = 'Error: ' + err.message;
        el.classList.remove('thinking');
        status.textContent = '';
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
